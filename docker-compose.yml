version: "3.8"

services:
  mysql:
    image: mysql:8.0
    container_name: spring-crud-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ramzan
      MYSQL_DATABASE: spring_crud
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-pramzan"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: spring-crud-app
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/spring_crud
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ramzan
    ports:
      - "8080:8080"
    volumes:
      - ./logs:/app/logs

volumes:
  mysql_data: